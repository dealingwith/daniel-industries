<?xml version="1.0" ?>
<xblog>

  <head>
    <title><$BlogTitle$></title>
    <description><$BlogDescription$></description>
    <url>http://www.danielsjourney.com</url>
  </head>

  <blog>
<Blogger>

<BlogDateHeader>
    <day date="<$BlogDateHeaderDate$>">
</BlogDateHeader>

      <entry>
        <id><$BlogItemNumber$></id>
        <permalink><$BlogItemArchiveFileName$></permalink>
        <time><$BlogItemDateTime$></time>
        <author><$BlogItemAuthor$></author>
        <author_email><$BlogItemAuthorEmail$></author_email>
        <url><$BlogItemURL$></url>
        <body><![CDATA[<$BlogItemBody$>]]></body>
      </entry>

<BlogDateFooter>
    </day>
</BlogDateFooter>

</Blogger>
  </blog>

</xblog>
